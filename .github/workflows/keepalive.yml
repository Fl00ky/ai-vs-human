name: Supabase Keep-Alive

# Supabase free-tier pauses a project after 7 days of inactivity. This makes a
# tiny REST request once a day so the database stays awake. The publishable
# (anon) key is public by design, so it lives here directly — no secrets needed.

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch: {}   # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://neabhzifelrqprhzjqmg.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: sb_publishable_Bcx3B0_KfosH0Chpz0BA_w_hJK-3V1v")
          echo "Supabase responded: $code"
          test "$code" = "200"
